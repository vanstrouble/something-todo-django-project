{% extends "base.html" %}

{% block content %}
    <h1>Tasks</h1>
    <ul>
        {% for task in tasks %}
            <li>
                <a href="{% url 'task_detail' task.id %}">{{ task.title }}</a>
                <p>Urgent: {{ task.urgent }}</p>
                <p>Created at: {{ task.created_at }}</p>
            </li>
        {% empty %}
            <p>No tasks found.</p>
        {% endfor %}
    </ul>

{% endblock %}
